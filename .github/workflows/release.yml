name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Release CUDA (Linux + Windows) ──────────────────────────────────────
  build-cuda:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: transcriptor-linux-x86_64-cuda
            binary: transcriptor

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: transcriptor-windows-x86_64-cuda
            binary: transcriptor.exe

    runs-on: ${{ matrix.os }}
    name: "CUDA — ${{ matrix.artifact }}"

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Dependencias Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev libasound2-dev \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev ffmpeg

      - name: CUDA Toolkit (Linux)
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'

      - name: CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'

      - name: LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Caché Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cuda-${{ hashFiles('**/Cargo.lock') }}

      - name: Compilar con CUDA
        run: cargo build --release --target ${{ matrix.target }} --features cuda
        env:
          LIBCLANG_PATH: ${{ runner.os == 'Windows' && 'C:\Program Files\LLVM\bin' || '' }}

      - name: Empaquetar (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}

      - name: Empaquetar (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" .
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # ── Release CPU (macOS Intel + Apple Silicon) ────────────────────────────
  build-cpu-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: transcriptor-macos-intel-cpu
          - target: aarch64-apple-darwin
            artifact: transcriptor-macos-apple-silicon-cpu

    runs-on: macos-latest
    name: "CPU — ${{ matrix.artifact }}"

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Dependencias macOS
        run: brew install ffmpeg llvm

      - name: Caché Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cpu-${{ hashFiles('**/Cargo.lock') }}

      - name: Compilar sin CUDA
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # whisper-rs necesita libclang en macOS también
          LIBCLANG_PATH: /opt/homebrew/opt/llvm/lib

      - name: Empaquetar
        run: |
          cp target/${{ matrix.target }}/release/transcriptor .
          tar -czf ${{ matrix.artifact }}.tar.gz transcriptor

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Crear dos GitHub Releases diferenciadas ──────────────────────────────
  release:
    needs: [build-cuda, build-cpu-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release CUDA (Linux + Windows)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-cuda
          name: "${{ github.ref_name }} — CUDA (Linux & Windows)"
          body: |
            ## ⚡ Versión con aceleración CUDA — Linux y Windows

            Esta release utiliza CUDA para acelerar la inferencia de Whisper en GPU NVIDIA.

            ### Requisitos
            - **GPU NVIDIA** con drivers recientes (CUDA 12.x)
            - **Linux**: `ffmpeg`, `pulseaudio-utils` (`pactl`, `parecord`)
            - **Windows**: [ffmpeg](https://ffmpeg.org/download.html) añadido al PATH

            ### ¿Por qué CUDA solo en Linux y Windows?
            Apple eliminó el soporte para GPUs NVIDIA en macOS desde 2019. Los Macs
            modernos usan Apple Silicon (M1/M2/M3), que tiene su propio framework de
            cómputo (Metal). La versión para macOS usa únicamente CPU optimizada.

            > Si no tienes GPU NVIDIA, descarga la versión CPU de macOS o compila
            > manualmente sin el feature `cuda`.
          files: |
            artifacts/transcriptor-linux-x86_64-cuda.tar.gz
            artifacts/transcriptor-windows-x86_64-cuda.zip
          generate_release_notes: false

      - name: Release CPU (macOS)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-macos
          name: "${{ github.ref_name }} — CPU (macOS)"
          body: |
            ## 🍎 Versión CPU — macOS (Intel y Apple Silicon)

            Esta release funciona exclusivamente con CPU, sin dependencias de CUDA.

            ### Requisitos
            - **ffmpeg**: `brew install ffmpeg`
            - **Captura de audio del sistema**: requiere [BlackHole](https://github.com/ExistentialAudio/BlackHole)
              (gratuito). Sin él, solo podrás transcribir el micrófono.

            ### ¿Por qué CPU y no GPU?
            Apple eliminó el soporte para GPUs NVIDIA (CUDA) en macOS desde 2019.
            Los chips Apple Silicon (M1/M2/M3) usan Metal como framework de cómputo,
            que actualmente no está soportado por `whisper-rs`. La inferencia en CPU
            en Apple Silicon es razonablemente rápida gracias a sus unidades de cómputo
            integradas (especialmente en M2/M3).

            ### Intel vs Apple Silicon
            - `transcriptor-macos-intel-cpu` → Macs con procesador Intel
            - `transcriptor-macos-apple-silicon-cpu` → Macs con chip M1/M2/M3
          files: |
            artifacts/transcriptor-macos-intel-cpu.tar.gz
            artifacts/transcriptor-macos-apple-silicon-cpu.tar.gz
          generate_release_notes: false